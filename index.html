      )}

      {/* Article Editor */}
      {tab==='articles'&&editing&&(
        <div style={{flex:1,overflow:'auto',padding:'0 24px 20px'}}>
          <button onClick={()=>setEditing(null)} style={{background:'none',border:'none',fontSize:13,color:'#c46b98',fontWeight:700,cursor:'pointer',padding:'0 0 12px',fontFamily:'inherit'}}>← 返回列表</button>
          <label style={S.fl}>标题</label>
          <input value={editing.title} onChange={e=>setEditing({...editing,title:e.target.value})} placeholder="文章标题" style={S.inp}/>
          <label style={S.fl}>标签 (逗号分隔)</label>
          <input value={editing.tags.join(', ')} onChange={e=>setEditing({...editing,tags:e.target.value.split(',').map(t=>t.trim()).filter(Boolean)})} placeholder="shopping, tax-free, tips" style={S.inp}/>
          <label style={S.fl}>内容</label>
          <textarea value={editing.content} onChange={e=>setEditing({...editing,content:e.target.value})} placeholder="在这里写文章内容..." style={{...S.inp,minHeight:200,resize:'vertical',lineHeight:1.7}}/>
          <div style={{display:'flex',gap:8,marginTop:14}}>
            {editing.id&&<button onClick={()=>handleDeleteArticle(editing.id)} style={S.delBtn}>删除</button>}
            <button onClick={()=>setEditing(null)} style={S.canBtn}>取消</button>
            <button onClick={handleSaveArticle} style={{...S.savBtn,flex:1}}>保存</button>
          </div>
        </div>
      )}

      {/* AI Chat Tab */}
      {tab==='ai'&&(
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <div style={{flex:1,overflow:'auto',padding:'0 24px 12px'}}>
            {chatMsgs.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#9ca3af',fontSize:14}}>
              {GEMINI_KEY?'基于知识库内容回答你的旅行问题':'⚠️ 未配置 Gemini API Key\n请在 config.js 中设置 window.GEMINI_KEY'}
            </div>}
            {chatMsgs.map((m,i)=>(
              <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',marginBottom:10}}>
                <div style={{maxWidth:'85%',padding:'10px 14px',borderRadius:m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',background:m.role==='user'?'linear-gradient(135deg,#c46b98,#e8a0bf)':'#fff',color:m.role==='user'?'#fff':'#1a1a2e',fontSize:14,lineHeight:1.6,border:m.role==='user'?'none':'1px solid #e8e4de',boxShadow:'0 1px 3px rgba(0,0,0,0.05)',whiteSpace:m.role==='user'?'pre-wrap':'normal'}}>
                  {m.role==='ai'?(<div>
                    {m.text&&renderMd(m.text,(id)=>{onClose();setTimeout(()=>onScrollToActivity&&onScrollToActivity(id),300);})}
                    {m.functionCalls&&m.functionCalls.map((fc,ci)=>(<PreviewCard key={ci} fc={fc} days={days} onApply={()=>handleApplyPreview(i,ci)} onDismiss={()=>handleDismissPreview(i,ci)}/>))}
                    {m.groundingSources&&m.groundingSources.length>0&&(<div style={{fontSize:11,color:'#9ca3af',marginTop:8,paddingTop:6,borderTop:'1px solid #f0ede8'}}>🔍 来源: {m.groundingSources.slice(0,3).map((s,si)=>(<a key={si} href={s.web?.uri} target="_blank" rel="noopener" style={{color:'#1a73a7',marginRight:8,textDecoration:'none'}}>{s.web?.title||'Link'}</a>))}</div>)}
                  </div>):m.text}
                  <div style={{fontSize:10,marginTop:4,opacity:0.6,textAlign:'right'}}>{m.time}</div>
                </div>
              </div>
            ))}
            {loading&&<div style={{display:'flex',justifyContent:'flex-start',marginBottom:10}}>
              <div style={{padding:'10px 14px',borderRadius:'14px 14px 14px 4px',background:'#fff',border:'1px solid #e8e4de',fontSize:14,color:'#9ca3af'}}>思考中...</div>
            </div>}
            <div ref={chatEndRef}/>
          </div>
          <div style={{padding:'12px 24px 20px',borderTop:'1px solid #e8e4de',display:'flex',gap:8,flexShrink:0}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSendChat();}}} placeholder="问我关于旅行的问题..." style={{...S.inp,flex:1}} disabled={loading}/>
            <button onClick={handleSendChat} disabled={loading||!chatInput.trim()} style={{...S.savBtn,padding:'10px 18px',opacity:loading||!chatInput.trim()?0.5:1}}>发送</button>
          </div>
        </div>
      )}
    </div>
  </div>);
}

function App(){
  const[days,setDays]=useState(INIT_DAYS);const[exp,setExp]=useState({1:true});const[viewE,setViewE]=useState(null);const[dayM,setDayM]=useState(null);const[editA,setEditA]=useState(null);const[editD,setEditD]=useState(null);
  const[copied,setCopied]=useState(false);const[saveStatus,setSaveStatus]=useState("");const[showPasteModal,setShowPasteModal]=useState(false);const[pasteText,setPasteText]=useState("");const[showMobile,setShowMobile]=useState(false);const[fullMap,setFullMap]=useState(false);const[showVersions,setShowVersions]=useState(false);const[ghSaveStatus,setGhSaveStatus]=useState("");
  const[origin,setOrigin]=useState(null);
  const[geocoding,setGeocoding]=useState(false);const[geocodeProgress,setGeocodeProgress]=useState("");
  const fileRef=useRef(null);
  const[rateInfo,setRateInfo]=useState({live:false,myr:RATES.MYR,updated:""});
  const[knowledgeBase,setKnowledgeBase]=useState([]);const[showKB,setShowKB]=useState(false);

  // Fetch real-time exchange rates
  useEffect(()=>{
    (async()=>{
      try{
        const res=await fetch("https://open.er-api.com/v6/latest/JPY");
        const json=await res.json();
        if(json.result==="success"&&json.rates){
          const myrRate=1/json.rates.MYR; // how many JPY per 1 MYR
          const usdRate=1/json.rates.USD; // how many JPY per 1 USD
          RATES={MYR:myrRate,USD:usdRate,_live:true,_updated:json.time_last_update_utc||""};
          setRateInfo({live:true,myr:myrRate,updated:json.time_last_update_utc||""});
        }
      }catch(e){
        console.warn("Exchange rate fetch failed, using fallback rates",e);
      }
    })();
  },[]);
  const tripDays=days.filter(d=>!d.isPreTrip);
  const cities=[];let prev="";tripDays.forEach(d=>{const l=d.location.split("→")[0].split("/")[0].trim();if(l!==prev){cities.push({name:l,start:d.id});prev=l;}});
  const tA=tripDays.reduce((s,d)=>s+d.activities.length,0);
  const dateRange=useMemo(()=>{const td=days.filter(d=>!d.isPreTrip);if(!td.length)return"";const months={Jan:"1月",Feb:"2月",Mar:"3月",Apr:"4月",May:"5月",Jun:"6月",Jul:"7月",Aug:"8月",Sep:"9月",Oct:"10月",Nov:"11月",Dec:"12月"};const first=td[0].date,last=td[td.length-1].date;const[fm,fd]=first.split(" ");const[lm,ld]=last.split(" ");if(fm===lm)return`2026年${months[fm]}${fd}–${ld}日`;return`2026年${months[fm]}${fd}日–${months[lm]}${ld}日`;},[days]);
  const allMk=useMemo(()=>{const m=[];days.forEach(d=>{if(d.hotel&&d.hotel.la&&d.hotel.lo)m.push({name:d.hotel.name,la:d.hotel.la,lo:d.hotel.lo,isH:true,cat:"hotel",addr:d.hotel.addr});d.activities.filter(a=>a.la&&a.lo).forEach(a=>m.push({name:a.name,la:a.la,lo:a.lo,cat:a.category,img:a.img,id:a.id,addr:a.addr}));});const s=new Set();return m.filter(p=>{if(s.has(p.name))return false;s.add(p.name);return true;});},[days]);

  const hSave=async(form)=>{
    // Check if address or name changed — if so, re-geocode even if coords exist
    const orig=days.flatMap(d=>d.activities).find(a=>a.id===form.id);
    const addrChanged=orig&&(orig.addr!==form.addr||orig.name!==form.name);
    let geocoded=form;
    if(addrChanged){
      // Clear old coords so geocodeActivity will re-fetch
      geocoded=await geocodeActivity({...form,la:undefined,lo:undefined});
    }else{
      geocoded=await geocodeActivity(form);
    }
    setDays(p=>p.map(d=>{if(d.id!==editD)return d;const ex=d.activities.find(a=>a.id===geocoded.id);if(ex)return{...d,activities:d.activities.map(a=>a.id===geocoded.id?geocoded:a)};return{...d,activities:[...d.activities,{...geocoded,id:`${d.id}_${Date.now()}`}]};}));
  };
  const hDel=id=>setDays(p=>p.map(d=>({...d,activities:d.activities.filter(a=>a.id!==id)})));
  const hClick=(act,did)=>{if(act.type==="note"){setEditA(act);setEditD(did);}else setViewE(act);};
  const hEditExp=act=>{setViewE(null);setEditA(act);setEditD(days.find(d=>d.activities.some(a=>a.id===act.id))?.id);};

  // Export JSON
  const handleExport=()=>{
    const data=JSON.stringify({version:1,exportDate:new Date().toISOString(),days,origin,knowledgeBase},null,2);
    const blob=new Blob([data],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`japan-trip-${new Date().toISOString().split("T")[0]}.json`;a.click();
    URL.revokeObjectURL(url);
  };

  // Import JSON from file (with auto-geocoding)
  const handleImport=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.days&&Array.isArray(data.days)){
          setDays(data.days);setExp({[data.days[0]?.id]:true});
          if(data.origin)setOrigin(data.origin);
          if(data.knowledgeBase&&Array.isArray(data.knowledgeBase))setKnowledgeBase(data.knowledgeBase);
          const actCount=data.days.reduce((s,d)=>s+d.activities.length,0);
          // Auto-geocode missing coordinates
          setGeocoding(true);setGeocodeProgress("🔍 检查坐标...");
          const result=await geocodeMissing(data.days,(done,total)=>{
            setGeocodeProgress(`📍 地理编码中... ${done}/${total}`);
          });
          setGeocoding(false);setGeocodeProgress("");
          if(result.updated){
            setDays(result.days);
            enrichActivities(result.days, setDays);
            alert(`✅ 已导入 ${data.days.length} 天, ${actCount} 个体验\n📍 自动定位了 ${result.count} 个地址`);
          }else{
            enrichActivities(data.days, setDays);
            alert(`✅ 已导入 ${data.days.length} 天, ${actCount} 个体验`);
          }
        }else{alert("❌ 无效的JSON格式：缺少 days 数组");}
      }catch(err){alert("❌ JSON解析失败: "+err.message);}
    };
    reader.readAsText(file);e.target.value="";
  };

  // Copy JSON to clipboard
  const handleCopy=async()=>{
    const data=JSON.stringify({version:1,exportDate:new Date().toISOString(),days,origin,knowledgeBase},null,2);
    await navigator.clipboard.writeText(data);
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };

  // Import from paste modal (with auto-geocoding)
  const handlePasteImport=async()=>{
    try{
      const data=JSON.parse(pasteText);
      if(data.days&&Array.isArray(data.days)){
        setDays(data.days);setShowPasteModal(false);setPasteText("");
        if(data.origin)setOrigin(data.origin);
        if(data.knowledgeBase&&Array.isArray(data.knowledgeBase))setKnowledgeBase(data.knowledgeBase);
        // Auto-geocode missing coordinates
        setGeocoding(true);setGeocodeProgress("🔍 检查坐标...");
        const result=await geocodeMissing(data.days,(done,total)=>{
          setGeocodeProgress(`📍 地理编码中... ${done}/${total}`);
        });
        setGeocoding(false);setGeocodeProgress("");
        if(result.updated){
          setDays(result.days);
          enrichActivities(result.days, setDays);
          alert(`✅ 已导入 ${data.days.length} 天\n📍 自动定位了 ${result.count} 个地址`);
        }else{
          enrichActivities(data.days, setDays);
          alert(`✅ 已导入 ${data.days.length} 天`);
        }
      }else{alert("❌ 无效格式");}
    }catch(err){alert("❌ JSON解析失败");}
  };

  // Auto-detect origin when days change and no origin set
  useEffect(()=>{
    if(!origin){
      const detected=detectOrigin(days);
      if(detected)setOrigin(detected);
    }
  },[days,origin]);

  // Auto-save to localStorage (debounced 2s)
  useEffect(()=>{
    const timer=setTimeout(()=>{
      try{
        localStorage.setItem("trip-planner-data",JSON.stringify({version:1,days,origin,knowledgeBase,savedAt:new Date().toISOString()}));
        setSaveStatus("saved");
      }catch(e){/* storage may not be available */}
    },2000);
    return()=>clearTimeout(timer);
  },[days,origin,knowledgeBase]);

  // Auto-save to GitHub (debounced 30s)
  useEffect(()=>{
    if(!GITHUB_PAT||days.length===0)return;
    const timer=setTimeout(async()=>{
      setGhSaveStatus("saving");
      const r=await githubSave(days,origin,knowledgeBase);
      setGhSaveStatus(r.ok?"saved":"error");
      if(r.ok)setTimeout(()=>setGhSaveStatus(""),5000);
    },30000);
    return()=>clearTimeout(timer);
  },[days,origin,knowledgeBase]);

  // Auto-load: fetch both localStorage and GitHub, pick the newer one
  useEffect(()=>{
    (async()=>{
      let localData=null,ghData=null;
      // 1. Try localStorage
      try{
        const raw=localStorage.getItem("trip-planner-data");
        if(raw){const parsed=JSON.parse(raw);if(parsed.days&&parsed.days.length>0)localData=parsed;}
      }catch(e){}
      // 2. Always try GitHub too (if PAT available)
      if(GITHUB_PAT){
        try{
          const[contentsRes,commitsRes]=await Promise.all([
            fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}?ref=${GITHUB_BRANCH}`,{headers:{'Authorization':`token ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}}),
            fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?sha=${GITHUB_BRANCH}&path=${GITHUB_FILE}&per_page=1`,{headers:{'Authorization':`token ${GITHUB_PAT}`,'Accept':'application/vnd.github.v3+json'}})
          ]);
          if(contentsRes.ok){
            const d=await contentsRes.json();
            const parsed=JSON.parse(decodeURIComponent(escape(atob(d.content))));
            if(parsed.days&&parsed.days.length>0){
              // Get commit date as the GitHub version's timestamp
              let ghDate=parsed.savedAt||null;
              if(commitsRes.ok){const commits=await commitsRes.json();if(commits[0])ghDate=commits[0].commit.committer.date;}
              ghData={...parsed,savedAt:ghDate};
            }
          }
        }catch(e){}
      }
      // 3. Pick the newer source
      let data=null;
      if(localData&&ghData){
        const localTime=localData.savedAt?new Date(localData.savedAt).getTime():0;
        const ghTime=ghData.savedAt?new Date(ghData.savedAt).getTime():0;
        data=ghTime>localTime?ghData:localData;
        if(data===ghData)setSaveStatus("cloud");
      }else{
        data=localData||ghData;
        if(data===ghData)setSaveStatus("cloud");
      }
      // 4. Load data if found
      if(data&&data.days){
        setDays(data.days);
        if(data.origin)setOrigin(data.origin);
        if(data.knowledgeBase&&Array.isArray(data.knowledgeBase))setKnowledgeBase(data.knowledgeBase);
        const result=await geocodeMissing(data.days);
        if(result.updated){
          setDays(result.days);
          enrichActivities(result.days, setDays);
        } else {
          enrichActivities(data.days, setDays);
        }
      }
    })();
  },[]);

  return(<div style={S.root}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 15% 20%, rgba(232,160,191,0.1) 0%, transparent 50%), radial-gradient(ellipse at 85% 60%, rgba(232,160,191,0.06) 0%, transparent 40%)",pointerEvents:"none",zIndex:0}}/>
    <div style={S.container}>
      <div style={{textAlign:"center",marginBottom:20,paddingTop:4}}>
        <div style={{fontSize:11,letterSpacing:6,color:"#c46b98",opacity:0.7,marginBottom:6,fontWeight:700}}>旅の計画 · 互动行程规划</div>
        <h1 style={{fontSize:"clamp(22px, 5vw, 32px)",fontWeight:800,color:"#1a1a2e",margin:"0 0 6px",lineHeight:1.2}}>日本春季樱花自驾之旅</h1>
        <div style={{fontSize:14,color:"#6b7280"}}>{dateRange} · {tA}个体验 · 🌸樱花 🍜美食 🎮二次元 📸摄影 🌊海边</div>
        <div style={S.routeBadge}>{origin?origin.name:"🏠"} {cities.map((c,i)=>(<span key={c.name}><span style={{color:"#c46b98"}}>{i===0?" ✈ ":" 🚗 "}</span>{c.name}</span>))} <span style={{color:"#c46b98"}}> ✈ </span>{origin?origin.name:"🏠"}</div>
      </div>
      <InlineRouteMap days={days} onViewFull={()=>setFullMap(true)}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexWrap:"wrap",padding:"8px 0",marginBottom:8}}>
        {cities.map((c,i)=>(<div key={c.name} style={{display:"flex",alignItems:"center"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:12,height:12,borderRadius:"50%",background:"linear-gradient(135deg,#c46b98,#e8a0bf)",border:"3px solid #faf8f4",boxShadow:"0 0 0 2px #c46b98"}}/><span style={{fontSize:12,fontWeight:700,color:"#1a1a2e"}}>{c.name}</span><span style={{fontSize:10,color:"#9ca3af"}}>Day {c.start}</span></div>{i<cities.length-1&&<div style={{width:40,height:2,background:"linear-gradient(90deg,#c46b98,#e8a0bf)",margin:"0 6px",marginBottom:26,opacity:0.35}}/>}</div>))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4, 1fr)",gap:8,margin:"12px 0 16px"}}>
        {[["天数",tripDays.length+"天"],["体验",tA],["城市",cities.length],["住宿",days.reduce((s,d)=>s+(d.hotel?1:0),0)+"处"]].map(([l,v])=>(<div key={l} style={S.sumItem}><span style={S.sumLabel}>{l}</span><span style={S.sumValue}>{v}</span></div>))}
      </div>
      {days.some(d=>d.isPreTrip)?days.filter(d=>d.isPreTrip).map(day=>(<DaySection key={day.id} day={day} expanded={!!exp[day.id]} onToggle={()=>setExp(p=>({...p,[day.id]:!p[day.id]}))} onClickAct={(a)=>hClick(a,day.id)} onOpenDay={id=>setDayM(id)} onAdd={did=>{setEditA({id:"new_"+Date.now(),type:"note",name:"",category:"sightseeing",time:"Daytime",cost:"",currency:"MYR",notes:""});setEditD(did);}} onRemove={id=>setDays(p=>p.filter(d=>d.id!==id))}/>)):<button onClick={()=>{setDays(p=>[{id:0,date:"Pre-Trip",dow:"",location:"准备",theme:"出发前准备",weather:"",isPreTrip:true,activities:[]},...p]);setExp(prev=>({...prev,[0]:true}));}} style={{...S.pillBtn,background:"#ecf5ec",color:"#2d7a3a",border:"2px dashed #2d7a3a",fontSize:13,padding:"8px 20px",margin:"0 auto 8px",display:"block"}}>+ 添加出发前准备</button>}
      {tripDays.map(day=>(<DaySection key={day.id} day={day} expanded={!!exp[day.id]} onToggle={()=>setExp(p=>({...p,[day.id]:!p[day.id]}))} onClickAct={(a)=>hClick(a,day.id)} onOpenDay={id=>setDayM(id)} onAdd={did=>{setEditA({id:"new_"+Date.now(),type:"poi",name:"",category:"sightseeing",time:"Morning",cost:"",currency:"¥",notes:""});setEditD(did);}} onRemove={id=>setDays(p=>p.filter(d=>d.id!==id))} onReorder={(data,toDayId,toIdx)=>{setDays(p=>{const nd=JSON.parse(JSON.stringify(p));const fromDay=nd.find(d=>d.id===data.dayId);const toDay=nd.find(d=>d.id===toDayId);if(!fromDay||!toDay)return p;const[item]=fromDay.activities.splice(data.index,1);if(!item)return p;toDay.activities.splice(toIdx,0,item);return nd;});}}/>))}
      <button onClick={()=>{const DOWS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const MDAYS=[31,28,31,30,31,30,31,31,30,31,30,31];const last=tripDays[tripDays.length-1];let nid=(last?.id||0)+1;let ndate="",ndow="";if(last?.date){const[m,d]=last.date.split(" ");const mi=MONS.indexOf(m);const di=parseInt(d)+1;if(di>MDAYS[mi]){ndate=MONS[(mi+1)%12]+" 1";}else{ndate=m+" "+di;}const base=new Date(2026,mi,parseInt(d)+1);ndow=DOWS[base.getDay()];}else{ndate="";ndow="";}const nd={id:nid,date:ndate,dow:ndow,location:"",theme:"",weather:"",activities:[]};setDays(p=>[...p,nd]);setExp(prev=>({...prev,[nid]:true}));}} style={{...S.pillBtn,background:"linear-gradient(135deg,#c46b98,#e8a0bf)",color:"#fff",border:"none",fontSize:14,padding:"10px 24px",margin:"8px auto",display:"block"}}>+ 添加新天</button>
      <div style={{display:"flex",gap:8,justifyContent:"center",margin:"12px 0 20px"}}><button style={S.pillBtn} onClick={()=>{const a={};days.forEach(d=>a[d.id]=true);setExp(a);}}>全部展开</button><button style={S.pillBtn} onClick={()=>setExp({})}>全部折叠</button></div>
      {/* Save/Load Toolbar */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",padding:"14px 0",margin:"0 0 16px",borderTop:"1px solid #e8e4de",borderBottom:"1px solid #e8e4de"}}>
        <button onClick={handleExport} style={S.toolBtn}>📥 导出JSON</button>
        <button onClick={()=>fileRef.current?.click()} style={S.toolBtn}>📤 导入JSON</button>
        <button onClick={handleCopy} style={{...S.toolBtn,background:copied?"#ecf5ec":"#fff"}}>{copied?"✅ 已复制!":"📋 复制JSON"}</button>
        <button onClick={()=>setShowPasteModal(true)} style={S.toolBtn}>📋 粘贴导入</button>
        {GITHUB_PAT&&<button onClick={()=>setShowVersions(true)} style={S.toolBtn}>📜 版本历史</button>}
        {GITHUB_PAT&&<button onClick={async()=>{setGhSaveStatus("saving");const r=await githubSave(days,origin,knowledgeBase);setGhSaveStatus(r.ok?"saved":"error");if(r.ok)setTimeout(()=>setGhSaveStatus(""),5000);}} style={{...S.toolBtn,background:ghSaveStatus==="saved"?"#ecf5ec":ghSaveStatus==="error"?"#fef2f2":"#fff"}}>{ghSaveStatus==="saving"?"☁️ 保存中...":ghSaveStatus==="saved"?"☁️ 已保存到GitHub":ghSaveStatus==="error"?"⚠️ 保存失败":"☁️ 保存到GitHub"}</button>}
        <button onClick={()=>setShowKB(true)} style={{...S.toolBtn,background:'#f0ecf8',color:'#6b48a8',borderColor:'#d8d0f0'}}>📚 知识库</button>
        {geocoding&&<span style={{fontSize:12,color:"#c46b98",alignSelf:"center",fontWeight:600}}>{geocodeProgress}</span>}
        {!geocoding&&saveStatus==="saved"&&<span style={{fontSize:12,color:"#2d7a3a",alignSelf:"center"}}>💾 已自动保存</span>}
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
      </div>
      <BudgetSummary days={days} rateInfo={rateInfo}/>
      <div style={{...S.notesBox,marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setShowMobile(!showMobile)}>
          <span style={{fontSize:16,fontWeight:700}}>📖 使用指南</span>
          <span style={{transform:showMobile?"rotate(180deg)":"",transition:"0.2s"}}>▾</span>
        </div>
        {showMobile&&(
          <div style={{marginTop:14,fontSize:14,color:"#4a4a5a",lineHeight:1.9}}>
            <div><strong>📱 多设备同步</strong></div>
            <div>◆ 数据自动保存到 GitHub（每30秒）</div>
            <div>◆ 新设备打开即自动加载最新行程</div>
            <div>◆ 点击「📜 版本历史」可恢复任意历史版本</div>
            <div style={{marginTop:8}}><strong>✏️ 编辑行程</strong></div>
            <div>◆ 点击卡片 → 查看详情 / 编辑</div>
            <div>◆ 拖拽 ⠿ 图标可排序活动</div>
            <div>◆ 点击 + 添加新体验</div>
            <div>◆ 点击 🗺️ 打开日视图+地图</div>
            <div style={{marginTop:8}}><strong>💾 数据备份</strong></div>
            <div>◆ 📥 导出JSON — 下载完整行程文件</div>
            <div>◆ 📤 导入JSON — 从文件恢复行程</div>
            <div>◆ 📋 复制/粘贴 — 跨设备快速传输</div>
            <div>◆ ☁️ 保存到GitHub — 手动立即保存</div>
            <div style={{marginTop:8}}><strong>🗺️ 地图功能</strong></div>
            <div>◆ 点击地图标记 → 查看地点详情</div>
            <div>◆ 点击 📍 → 打开 Google Maps 导航</div>
            <div>◆ ▶️ 播放按钮 — 飞行动画预览路线</div>
          </div>
        )}
      </div>
      <div style={{textAlign:"center",fontSize:12,color:"#b0b0b0",margin:"24px 0 16px"}}>点击体验查看详情 · 点击 <strong>🗺️</strong> 打开日视图+地图 · 点击 <strong>+</strong> 添加</div>
    </div>
    {showPasteModal&&(
      <div style={S.overlay} onClick={()=>setShowPasteModal(false)}>
        <div style={S.modal} onClick={e=>e.stopPropagation()}>
          <div style={{padding:"20px 24px"}}>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>📋 粘贴JSON导入</h3>
            <p style={{fontSize:13,color:"#6b7280",marginBottom:12}}>将之前导出的JSON内容粘贴到下方：</p>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder='{"version":1,"days":[...]}' style={{...S.inp,minHeight:200,resize:"vertical",fontFamily:"monospace",fontSize:12}}/>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>setShowPasteModal(false)} style={S.canBtn}>取消</button>
              <button onClick={handlePasteImport} style={{...S.savBtn,flex:1}}>导入</button>
            </div>
          </div>
        </div>
      </div>
    )}
    {fullMap&&(origin?<FullRouteMap days={days} origin={origin} onClose={()=>setFullMap(false)}/>:<FullMapModal markers={allMk} onClose={()=>setFullMap(false)} days={days}/>)}
    {viewE&&<ExperienceDetail act={viewE} onClose={()=>setViewE(null)} onEdit={hEditExp}/>}
    {dayM&&<DayDetailModal days={days} initialDayId={dayM} onClose={()=>setDayM(null)} onViewExp={act=>{setDayM(null);setViewE(act);}}/>}
    {editA&&<EditModal activity={editA} onSave={hSave} onDelete={hDel} onClose={()=>{setEditA(null);setEditD(null);}}/>}
    {showVersions&&<VersionHistoryModal onClose={()=>setShowVersions(false)} onRestore={(data)=>{setDays(data.days);if(data.origin)setOrigin(data.origin);if(data.knowledgeBase&&Array.isArray(data.knowledgeBase))setKnowledgeBase(data.knowledgeBase);}}/>}
    {showKB&&<KnowledgeBaseModal knowledgeBase={knowledgeBase} setKnowledgeBase={setKnowledgeBase} days={days} origin={origin} setDays={setDays} onClose={()=>setShowKB(false)} onScrollToActivity={(id)=>{
      // Expand the day containing this activity, then scroll to it
      const dayObj=days.find(d=>d.activities.some(a=>a.id===id));
      if(dayObj){setExp(p=>({...p,[dayObj.id]:true}));
        setTimeout(()=>{const el=document.getElementById('act-'+id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px #c46b98';el.style.transition='box-shadow 0.3s';setTimeout(()=>{el.style.boxShadow='';},3000);}},400);
      }
    }}/>}
  </div>);
}

const S={
  root:{fontFamily:"'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",background:"#faf8f4",minHeight:"100vh",color:"#1a1a2e"},
  container:{maxWidth:700,margin:"0 auto",padding:"20px 16px",position:"relative",zIndex:1},
  routeBadge:{display:"inline-flex",alignItems:"center",gap:7,marginTop:10,padding:"8px 18px",background:"#fff",border:"1px solid #e8e4de",borderRadius:100,fontSize:13,fontWeight:600,boxShadow:"0 2px 8px rgba(26,26,46,0.06)"},
  daySection:{marginBottom:12,borderRadius:14,overflow:"hidden",background:"#fff",border:"1px solid #e8e4de",boxShadow:"0 2px 8px rgba(0,0,0,0.03)"},
  dayHeader:{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:"linear-gradient(135deg,#1a1a2e,#2d2d4a)",cursor:"pointer",userSelect:"none"},
  dayNum:{width:36,height:36,borderRadius:"50%",border:"2px solid #e8a0bf",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:"#f5dce8",flexShrink:0},
  locBadge:{background:"rgba(255,255,255,0.12)",padding:"3px 10px",borderRadius:100,fontSize:10,fontWeight:700,letterSpacing:0.8,color:"rgba(255,255,255,0.75)",textTransform:"uppercase"},
  mapBtn:{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontSize:14},
  actCard:{padding:"14px 16px",marginBottom:8,borderRadius:12,border:"1px solid #f0ede8",cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 4px rgba(0,0,0,0.04)",background:"#fff"},
  addBtn:{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",padding:"10px",borderRadius:10,border:"2px dashed #e8e4de",background:"transparent",cursor:"pointer",fontSize:13,fontWeight:600,color:"#9ca3af",fontFamily:"inherit"},
  pillBtn:{padding:"7px 18px",borderRadius:100,border:"1px solid #e8e4de",background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#6b7280",fontFamily:"inherit"},
  sumItem:{background:"#fff",border:"1px solid #e8e4de",borderRadius:12,padding:"12px 8px",textAlign:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.03)"},
  sumLabel:{display:"block",fontSize:10,textTransform:"uppercase",letterSpacing:1.2,color:"#9ca3af",fontWeight:700,marginBottom:3},
  sumValue:{fontSize:16,fontWeight:800,color:"#1a1a2e"},
  budgetBox:{padding:"22px",background:"#fff",border:"1px solid #e8e4de",borderRadius:16,boxShadow:"0 2px 12px rgba(0,0,0,0.04)"},
  grandTotal:{background:"linear-gradient(135deg,#1a1a2e,#2d2d4a)",borderRadius:12,padding:"16px 18px",marginTop:4},
  notesBox:{padding:"18px 22px",background:"#fff",border:"1px solid #e8e4de",borderRadius:14,boxShadow:"0 2px 10px rgba(0,0,0,0.04)"},
  overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16},
  modal:{background:"#fff",borderRadius:20,maxWidth:500,width:"100%",maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.2)"},
  panel:{background:"#fff",borderRadius:20,width:"100%",maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.25)"},
  dayModal:{background:"#fff",borderRadius:20,maxWidth:520,width:"100%",maxHeight:"90vh",overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,0.25)",display:"flex",flexDirection:"column"},
  fl:{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,color:"#6b7280",marginTop:12,marginBottom:5},
  inp:{width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e8e4de",fontSize:14,fontFamily:"inherit",outline:"none",color:"#1a1a2e",background:"#faf8f4"},
  savBtn:{padding:"10px 22px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#c46b98,#e8a0bf)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"},
  canBtn:{padding:"10px 16px",borderRadius:10,border:"1px solid #e8e4de",background:"#fff",color:"#6b7280",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"},
  delBtn:{padding:"10px 16px",borderRadius:10,border:"1px solid #fecaca",background:"#fef2f2",color:"#dc2626",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"},
  toolBtn:{padding:"8px 16px",borderRadius:10,border:"1px solid #e8e4de",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#4a4a5a",fontFamily:"inherit",boxShadow:"0 1px 3px rgba(0,0,0,0.03)",transition:"all 0.15s"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
