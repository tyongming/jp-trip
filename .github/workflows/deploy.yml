name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys from secrets
        run: |
          cat > config.js << 'SCRIPT'
          window.MAPBOX_TOKEN = '${{ secrets.MAPBOX_TOKEN }}';
          window.GOOGLE_PLACES_KEY = '${{ secrets.GOOGLE_PLACES_KEY }}';
          SCRIPT

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
